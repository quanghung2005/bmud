{% extends 'base.html' %}

{% block title %}Khôi phục Mật khẩu{% endblock %}

{% block content %}
<div class="login-container glass-panel" style="max-width: 400px; margin: 2rem auto; text-align: center;">
    <h2>Khôi phục Mật khẩu</h2>
    <p style="margin-bottom: 20px; font-size: 14px;">Hệ thống sẽ đặt lại mật khẩu mới cho tài khoản được yêu cầu.</p>
    
    <form action="{{ url_for('reset_password') }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div style="text-align: left;">
            <label for="username" style="font-weight: bold; margin-bottom: 5px; display: block;">Tên đăng nhập (Username):</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white;">
        </div>
        
        <div style="text-align: left;">
            <label for="password" style="font-weight: bold; margin-bottom: 5px; display: block;">Mật khẩu mới:</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white;">
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Cập nhật Mật khẩu</button>
    </form>
    
    <div style="margin-top: 20px;">
        <a href="{{ url_for('login') }}" style="color: var(--accent-color); text-decoration: none; font-size: 14px;">Quay lại Đăng nhập</a>
    </div>
</div>
{% endblock %}
